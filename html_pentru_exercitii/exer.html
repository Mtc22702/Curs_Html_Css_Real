<!doctype html>
<html>
  <head>
    <style>
      .flex-container {
        display: flex;
        padding: 10px;
        margin: auto;
        width: 50%;
        height: 50vh;
        flex-direction: row;
        background-color: #e31b23;
        justify-content: space-around;
        align-items: stretch;
      }
      .flex-container > div {
        background-color: #ebebeb;
        width: 100px;
        margin: 10px;
        text-align: center;
        line-height: 75px;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>
  </body>
</html>
