<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grid Produse</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background-color: #f4f6f8;
        padding: 20px;
        margin: 0;
      }

      .product-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        max-width: 1200px;
        margin: 0 auto;
      }

      .product-card {
        background: #ffffff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 16px;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      .product-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
      }

      .product-card img {
        width: 100%;
        height: 200px;
        object-fit: contain;
        border-radius: 8px;
        margin-bottom: 16px;
      }

      .product-card h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
        color: #333;
        flex-grow: 1;
      }

      .product-card .price {
        font-size: 18px;
        font-weight: bold;
        color: #e67e22;
        margin-bottom: 16px;
      }

      .product-card .btn-add {
        width: 100%;
        padding: 10px;
        background-color: #3498db;
        color: #fff;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s ease;
      }

      .product-card .btn-add:hover {
        background-color: #2980b9;
      }

      @media (max-width: 992px) {
        .product-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }

      @media (max-width: 576px) {
        .product-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <section class="product-grid">
      <div class="product-card">
        <img
          src="https://i.dedeman.ro/media/catalog/product/cache/3/image/9df78eab33525d08d6e5fb8d27136e95/6/0/6020612.jpg"
          alt="Sticlă de Șampon Auto Premium"
        />
        <h3>Șampon Auto Premium</h3>
        <div class="price">65 RON</div>
        <button class="btn-add">Adaugă în coș</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.dedeman.ro/media/catalog/product/cache/3/image/9df78eab33525d08d6e5fb8d27136e95/6/0/6020612.jpg"
          alt="Cutie cu ceară Carnauba solidă"
        />
        <h3>Ceară Carnauba Solida</h3>
        <div class="price">120 RON</div>
        <button class="btn-add">Adaugă în coș</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.dedeman.ro/media/catalog/product/cache/3/image/9df78eab33525d08d6e5fb8d27136e95/6/0/6020612.jpg"
          alt="Sticlă cu soluție pentru curățarea jantelor"
        />
        <h3>Soluție curățare Jante</h3>
        <div class="price">45 RON</div>
        <button class="btn-add">Adaugă în coș</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.dedeman.ro/media/catalog/product/cache/3/image/9df78eab33525d08d6e5fb8d27136e95/6/0/6020612.jpg"
          alt="Lavetă gri de microfibră pentru uscare"
        />
        <h3>Lavetă Microfibră Uscare</h3>
        <div class="price">35 RON</div>
        <button class="btn-add">Adaugă în coș</button>
      </div>
    </section>
  </body>
</html>
