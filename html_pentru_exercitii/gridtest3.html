<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your cart</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        padding: 20px;
      }

      .cart {
        max-width: 900px;
        margin: auto;
        background: #fff;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #ddd;
      }

      .cart-item {
        display: grid;
        grid-template-columns: 140px 1fr auto;
        grid-template-areas:
          'img details price'
          'img details remove';
        gap: 15px;
        padding: 20px 0;
        border-bottom: 1px solid #ccc;
        align-items: start;
      }

      .cart-item:last-child {
        border-bottom: none;
      }

      .cart-item img {
        grid-area: img;
        width: 140px;
        height: 140px;
        object-fit: cover;
        border-radius: 6px;
      }

      .details {
        grid-area: details;
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .details h3 {
        font-size: 22px;
        font-weight: 500;
      }

      .details p {
        color: #777;
        font-size: 16px;
      }

      .price {
        grid-area: price;
        font-weight: bold;
        font-size: 22px;
        justify-self: end;
      }

      .remove {
        grid-area: remove;
        justify-self: end;
        align-self: end;
        background: none;
        border: none;
        text-decoration: underline;
        color: #888;
        cursor: pointer;
        font-size: 16px;
      }

      .remove:hover {
        color: #000;
      }

      /* 📱 responsive */
      @media (max-width: 530px) {
        .cart-item {
          grid-template-columns: 140px 1fr;
          grid-template-areas:
            'img details'
            'img price'
            'img remove';
        }

        .price,
        .remove {
          justify-self: start;
        }
      }
    </style>
  </head>

  <body>
    <section class="cart">
      <div class="cart-item">
        <img src="prob/1.jpeg" alt="" />
        <div class="details">
          <h3>Blazer</h3>
          <p>Color: Beige</p>
          <p>Size: S</p>
        </div>
        <div class="price">$95</div>
        <button class="remove">Remove</button>
      </div>

      <div class="cart-item">
        <img src="prob/2.jpeg" alt="" />
        <div class="details">
          <h3>Chunky Knit Sweater</h3>
          <p>Color: Brown</p>
          <p>Size: M</p>
        </div>
        <div class="price">$55</div>
        <button class="remove">Remove</button>
      </div>

      <div class="cart-item">
        <img src="prob/3.jpeg" alt="" />
        <div class="details">
          <h3>Mesh Sleeve Blouse</h3>
          <p>Color: Yellow</p>
          <p>Size: S</p>
        </div>
        <div class="price">$32</div>
        <button class="remove">Remove</button>
      </div>

      <div class="cart-item">
        <img src="prob/4.jpeg" alt="" />
        <div class="details">
          <h3>Retro Jeans</h3>
          <p>Color: Black</p>
          <p>Size: S</p>
        </div>
        <div class="price">$70</div>
        <button class="remove">Remove</button>
      </div>
    </section>
  </body>
</html>
