<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Layout Bootstrap</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background-color: #f7f1f1;
        font-family: Arial, sans-serif;
      }

      .product-section {
        padding: 40px 0;
      }

      .product-image {
        width: 100%;
        border-radius: 8px;
        object-fit: cover;
      }

      .thumb-img {
        width: 100%;
        height: 110px;
        object-fit: cover;
        border-radius: 6px;
      }

      .old-price {
        text-decoration: line-through;
        color: #999;
        margin-left: 10px;
      }

      .cart-btn {
        background-color: #2b0b0b;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 14px 20px;
        width: 100%;
        transition: 0.3s;
      }

      .cart-btn:hover {
        background-color: #441313;
      }

      .color-dot {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 10px;
        border: 1px solid #333;
      }

      .size-btn {
        min-width: 55px;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <section class="product-section">
      <div class="container">
        <div class="row align-items-start g-4">
          <!-- TEXT / INFO -->
          <!-- Pe mobil apare prima -->
          <!-- Pe md+ apare a doua -->
          <div class="col-12 col-md-5 offset-md-1 order-1 order-md-2">
            <div class="d-flex justify-content-between align-items-start mb-3">
              <h2 class="fw-bold mb-0">ZARA men’s shirt, summer wear</h2>
              <span class="badge border text-danger fs-5">-10%</span>
            </div>

            <p class="text-warning mb-2">
              ★★★★★ <span class="text-muted fs-6">5/5</span>
            </p>

            <div class="mb-4">
              <span class="fs-3 fw-bold">$58</span>
              <span class="old-price fs-4">$65</span>
            </div>

            <p class="text-muted">
              Lightweight, soft, and easy to style. Made from 100% natural
              cotton, great for all seasons.
            </p>

            <hr />

            <h6 class="mb-3">Select Color</h6>
            <div class="mb-4">
              <span class="color-dot" style="background-color: #f3ecec"></span>
              <span class="color-dot" style="background-color: #a39b5d"></span>
              <span class="color-dot" style="background-color: #4b0f12"></span>
            </div>

            <hr />

            <div class="d-flex justify-content-between align-items-center mb-3">
              <h6 class="mb-0">Select Size</h6>
              <a href="#" class="text-muted text-decoration-none">Size Guide</a>
            </div>

            <div class="d-flex gap-2 mb-4">
              <button class="btn btn-outline-secondary size-btn">S</button>
              <button class="btn btn-outline-secondary size-btn">M</button>
              <button class="btn btn-dark size-btn">L</button>
              <button class="btn btn-outline-secondary size-btn">XL</button>
            </div>

            <div class="d-flex align-items-center gap-3 mb-4">
              <div class="input-group" style="max-width: 130px">
                <button class="btn btn-outline-secondary" type="button">
                  -
                </button>
                <input type="text" class="form-control text-center" value="1" />
                <button class="btn btn-outline-secondary" type="button">
                  +
                </button>
              </div>
            </div>

            <button class="cart-btn">Add to Cart</button>
          </div>

          <!-- IMAGE -->
          <!-- Pe mobil apare a doua -->
          <!-- Pe md+ apare prima -->
          <div class="col-12 col-md-6 order-2 order-md-1">
            <img
              src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=900&q=80"
              alt="Produs"
              class="product-image mb-3"
            />

            <div class="row g-3">
              <div class="col-4">
                <img
                  src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?auto=format&fit=crop&w=400&q=80"
                  alt="thumb 1"
                  class="thumb-img"
                />
              </div>
              <div class="col-4">
                <img
                  src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=400&q=80"
                  alt="thumb 2"
                  class="thumb-img"
                />
              </div>
              <div class="col-4">
                <img
                  src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=400&q=80"
                  alt="thumb 3"
                  class="thumb-img"
                />
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
