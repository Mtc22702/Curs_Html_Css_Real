<!doctype html>
<html>
  <head>
    <style>
      #grid1 {
        display: grid;
        grid-template-columns: 2fr 1fr 2fr;
        /* grid-template-rows: 4fr 1fr; */
        grid-auto-rows: minmax(120px, auto);
      }

      #grid1 > div {
        background: coral;
        margin: 10px;
        padding: 10px;
        color: white;
        align-items: center;
        justify-content: center;
        display: flex;
      }
    </style>
  </head>
  <body>
    <div id="grid1">
      <div>One</div>
      <div>Two</div>
      <div>Three</div>
      <div>Four</div>
      <div>Five</div>
      <div>Six</div>
    </div>
  </body>
</html>
