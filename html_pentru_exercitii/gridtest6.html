<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flexible Product Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: sans-serif;
      }

      #grid1 {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        padding: 20px;
      }

      .card {
        display: grid;
        background-color: #ffe0b2;
        padding: 15px 20px 30px 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

      .star {
        justify-self: end;
        font-size: 1.2rem;
        margin-bottom: 5px;
      }

      .card img {
        width: 100%;
        height: 145px;
        object-fit: cover;
        border-radius: 8px;
      }

      .card h2 {
        margin-top: 25px;
        color: #000;
        font-size: 1.2rem;
        justify-self: center;
      }
    </style>
  </head>
  <body>
    <div id="grid1">
      <div class="card">
        <span class="star">⭐</span>
        <img
          src="./Curs_html_Css_Real/html_pentru_exercitii/prob/1.jpeg"
          alt="Shoes"
        />
        <h2>Shoes</h2>
      </div>
      <div class="card">
        <span class="star">⭐</span>
        <img
          src="./Curs_html_Css_Real/html_pentru_exercitii/prob/2.jpeg"
          alt="Bags"
        />
        <h2>Bags</h2>
      </div>
      <div class="card">
        <span class="star">⭐</span>
        <img
          src="./Curs_html_Css_Real/html_pentru_exercitii/prob/3.jpeg"
          alt="Accessories"
        />
        <h2>Accessories</h2>
      </div>
      <div class="card">
        <span class="star">⭐</span>
        <img
          src="./Curs_html_Css_Real/html_pentru_exercitii/prob/4.jpeg"
          alt="Jackets"
        />
        <h2>Jackets</h2>
      </div>
    </div>
  </body>
</html>
