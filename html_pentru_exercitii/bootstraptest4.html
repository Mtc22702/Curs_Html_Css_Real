<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Grid Example</title>
    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
      }
      .product-card {
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      }
      .product-card h4 {
        margin-bottom: 15px;
      }
      .product-card button {
        margin-top: 15px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row vh-100 align-items-stretch">
        <div class="col-4">
          <div class="product-card">
            <h4>Product 1</h4>
            <p>Short description.</p>
            <button class="btn btn-primary">Buy</button>
          </div>
        </div>
        <div class="col-4">
          <div class="product-card">
            <h4>Product 2</h4>
            <p>
              This product has a slightly longer description to test the layout.
            </p>
            <button class="btn btn-primary">Add to Cart</button>
          </div>
        </div>
        <div class="col-4">
          <div class="product-card">
            <h4>Product 3</h4>
            <p>
              Special offer! This product has the longest description so far,
              just to see how the height adjusts.
            </p>
            <button class="btn btn-primary">Order Now</button>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JS (optional, for interactions) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
