<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Layout Sketch</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .box {
        min-height: 80px;
        border: 1px solid #000;
        padding: 20px;
        font-weight: bold;
      }

      .logo-box {
        background-color: #f8c8c8;
      }
      .menu-box {
        background-color: #c8e6c9;
      }
      .actions-box {
        background-color: #c8d9f8;
      }

      .shipping-box {
        background-color: #fff3b0;
        min-height: 500px;
      }
      .review-box {
        background-color: #d9c8f8;
        min-height: 300px;
      }

      .footer-box-1 {
        background-color: #ffd6a5;
      }
      .footer-box-2 {
        background-color: #bde0fe;
      }
      .footer-box-3 {
        background-color: #caffbf;
      }

      .bottom-left {
        background-color: #f1c0e8;
      }
      .bottom-right {
        background-color: #a0c4ff;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <div class="container-lg">
      <div class="row">
        <div class="col-2 box logo-box">Logo (col-2)</div>
        <div class="col-5 box menu-box">Navigation menu (col-5)</div>
        <div class="col-5 box actions-box">Search + Cart + Login (col-5)</div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="container my-5">
      <div class="row">
        <div class="col-7 box shipping-box">
          Shipping Information + Payment Information (col-7)
        </div>
        <div class="col-5 box review-box">Review your Cart (col-5)</div>
      </div>
    </div>

    <!-- FOOTER TOP -->
    <div class="container my-5">
      <div class="row">
        <div class="col-4 box footer-box-1">Shop links (col-4)</div>
        <div class="col-4 box footer-box-2">Information links (col-4)</div>
        <div class="col-4 box footer-box-3">Customer Support links (col-4)</div>
      </div>
    </div>

    <!-- FOOTER BOTTOM -->
    <div class="container mb-5">
      <div class="row">
        <div class="col-8 box bottom-left">
          Designed and developed by... (col-6)
        </div>
        <div class="col-4 box bottom-right">Social media icons (col-6)</div>
      </div>
    </div>
    <script src="./bootstrap-5.3.8-dist/js/bootstrap.bundle.js"></script>
  </body>
</html>
