<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>

  <body class="bg-light">
    <div class="container py-5">
      <div class="row">
        <!-- Product Card 1 -->

        <div class="col-md-4 mb-4">
          <div class="card p-3">
            <img src="item1.png" class="card-img-top mb-3" alt="Product" />

            <h5 class="card-title">Dress</h5>

            <p class="card-text">$79.99</p>

            <button class="btn btn-primary w-100">Add to Cart</button>
          </div>
        </div>

        <!-- Product Card 2 -->

        <div class="col-md-4 mb-3">
          <div class="card p-4">
            <img src="item2.png" class="card-img-top mb-3" alt="Product" />

            <h5 class="card-title">Hat</h5>

            <p class="card-text">$9.99</p>

            <button class="btn btn-primary w-100">Add to Cart</button>
          </div>
        </div>

        <!-- Product Card 3 -->

        <div class="col-md-4 mb-3">
          <div class="card p-2">
            <img src="item3.png" class="card-img-top mb-3" alt="Product" />

            <h5 class="card-title">Dress</h5>

            <p class="card-text">$89.99</p>

            <button class="btn btn-primary w-100">Add to Cart</button>
          </div>
        </div>
      </div>
      <div class="row">
        <div class="col-md-4 mb-3">
          <div class="card p-2">
            <img
              class="img-fluid rounded"
              src="./Adarta_Detailing_WebSite/assets/img/header_adarta_2.JPEG"
              alt="image with rounded borders"
            />
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card p-2">
            <img
              class="img-fluid rounded-circle"
              src="./Adarta_Detailing_WebSite/assets/img/header_adarta_2.JPEG"
              alt="image with rounded-circle borders"
            />
          </div>
        </div>
        <div class="col-md-4 mb-3">
          <div class="card p-2">
            <img
              class="img-fluid img-thumbnail"
              src="./Adarta_Detailing_WebSite/assets/img/header_adarta_2.JPEG"
              alt="image with thumbnails borders"
            />
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
